<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-expand-lg menu">
            <div class="container"><a class="navbar-brand logo" href="../index.html">SmartBudget</a><button
                    class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"><span
                        class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarMain">
                    <ul class="navbar-nav ms-auto menu__list">
                        <li class="nav-item"><a class="nav-link menu__link" href="../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link menu__link menu__link--active"
                                href="./dashboard.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./movimientos.html">Movimientos</a>
                        </li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./presupuestos.html">Presupuestos</a>
                        </li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./reportes.html">Reportes</a></li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./contacto.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="page py-5">
        <div class="container">
            <div class="page-head">
                <h1>Dashboard general</h1><button class="btn btn-main" data-bs-toggle="offcanvas"
                    data-bs-target="#panelRapido">Panel rápido</button>
            </div>
            <div class="row g-4">
                <div class="col-md-6 col-xl-3">
                    <article class="card-box">
                        <h3>Ingresos</h3><strong>$2.450.000</strong>
                    </article>
                </div>
                <div class="col-md-6 col-xl-3">
                    <article class="card-box">
                        <h3>Gastos</h3><strong>$1.170.000</strong>
                    </article>
                </div>
                <div class="col-md-6 col-xl-3">
                    <article class="card-box">
                        <h3>Ahorro</h3><strong>$890.000</strong>
                    </article>
                </div>
                <div class="col-md-6 col-xl-3">
                    <article class="card-box">
                        <h3>Metas</h3><strong>4 activas</strong>
                    </article>
                </div>
            </div>
            <div class="content-panel mt-4">
                <h2>Estado del presupuesto</h2>
                <div class="progress mb-3">
                    <div class="progress-bar" style="width:78%">Hogar 78%</div>
                </div>
                <div class="progress mb-3">
                    <div class="progress-bar" style="width:62%">Transporte 62%</div>
                </div>
                <div class="progress">
                    <div class="progress-bar" style="width:45%">Ocio 45%</div>
                </div>
            </div>
        </div>
    </main>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="panelRapido">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title fs-5">Panel rápido</h2><button type="button" class="btn-close"
                data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="d-grid gap-3"><a class="btn btn-outline-main" href="./movimientos.html">Ver movimientos</a><a
                    class="btn btn-outline-main" href="./reportes.html">Ir a reportes</a></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
