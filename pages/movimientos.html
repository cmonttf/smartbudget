<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget | Movimientos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-expand-lg menu">
            <div class="container"><a class="navbar-brand logo" href="../index.html">SmartBudget</a><button
                    class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"><span
                        class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarMain">
                    <ul class="navbar-nav ms-auto menu__list">
                        <li class="nav-item"><a class="nav-link menu__link" href="../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./dashboard.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link menu__link menu__link--active"
                                href="./movimientos.html">Movimientos</a></li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./presupuestos.html">Presupuestos</a>
                        </li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./reportes.html">Reportes</a></li>
                        <li class="nav-item"><a class="nav-link menu__link" href="./contacto.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="page py-5">
        <div class="container">
            <div class="page-head">
                <h1>Movimientos</h1><button class="btn btn-main" data-bs-toggle="modal"
                    data-bs-target="#movimientoModal">Agregar</button>
            </div>
            <div class="content-panel">
                <div class="row g-3 mb-4">
                    <div class="col-md-4"><input class="form-control" placeholder="Buscar"></div>
                    <div class="col-md-4"><select class="form-select">
                            <option>Todos</option>
                            <option>Ingreso</option>
                            <option>Gasto</option>
                        </select></div>
                    <div class="col-md-4"><input class="form-control" type="month"></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Detalle</th>
                                <th>Tipo</th>
                                <th>Monto</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>03/06/2026</td>
                                <td>Sueldo</td>
                                <td><span class="badge bg-success">Ingreso</span></td>
                                <td>$1.800.000</td>
                            </tr>
                            <tr>
                                <td>05/06/2026</td>
                                <td>Supermercado</td>
                                <td><span class="badge bg-danger">Gasto</span></td>
                                <td>$124.000</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <div class="modal fade" id="movimientoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content modal-main">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Nuevo movimiento</h2><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form class="row g-3">
                        <div class="col-md-6"><input class="form-control" placeholder="Detalle"></div>
                        <div class="col-md-6"><input class="form-control" type="number" placeholder="Monto"></div>
                        <div class="col-12"><button type="button" class="btn btn-main w-100"
                                data-bs-dismiss="modal">Guardar</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
